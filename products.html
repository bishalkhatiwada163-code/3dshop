<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - MotoShowroom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">⚡ MotoShowroom</a>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="products.html" class="nav-link active">Shop</a></li>
        <li><a href="index.html#about" class="nav-link">About</a></li>
        <li><a href="index.html#contact" class="nav-link">Contact</a></li>
      </ul>
      <div class="nav-right">
        <button class="theme-toggle" id="themeToggle">🌙</button>
        <button class="cart-btn" id="cartBtn">🛒 <span id="cartCount">0</span></button>
      </div>
    </div>
  </nav>

  <!-- Cart Sidebar -->
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>Shopping Cart</h2>
      <button class="close-btn" id="closeCart">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <strong>Total:</strong>
        <span id="cartTotal">$0</span>
      </div>
      <button class="checkout-btn">Proceed to Checkout</button>
      <button class="clear-cart-btn" id="clearCartBtn">Clear Cart</button>
    </div>
  </div>

  <!-- Filters -->
  <section class="filters-section">
    <div class="filters-container">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="searchInput" placeholder="Search motorcycles...">
      </div>
      <div class="filter-group">
        <label>Category</label>
        <select id="categorySelect">
          <option value="">All Categories</option>
          <option value="sport">Sport</option>
          <option value="cruiser">Cruiser</option>
          <option value="touring">Touring</option>
          <option value="offroad">Off-Road</option>
          <option value="adventure">Adventure</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Price Range</label>
        <input type="number" id="minPrice" placeholder="Min" min="0">
        <input type="number" id="maxPrice" placeholder="Max" min="0">
      </div>
      <div class="filter-group">
        <label>Sort By</label>
        <select id="sortSelect">
          <option value="newest">Newest</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
      <button class="apply-filters-btn" id="applyFilters">Apply Filters</button>
    </div>
  </section>

  <!-- Products Grid -->
  <section class="products-section">
    <div class="products-container">
      <div class="products-grid" id="productsGrid"></div>
    </div>
  </section>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Loading Spinner -->
  <div id="loadingSpinner" class="loading-spinner">
    <div class="spinner"></div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section">
        <h4>MotoShowroom</h4>
        <p>Your ultimate destination for premium motorcycles</p>
      </div>
      <div class="footer-section">
        <h4>Quick Links</h4>
        <ul>
          <li><a href="products.html">Shop</a></li>
          <li><a href="index.html#about">About Us</a></li>
          <li><a href="index.html#contact">Contact</a></li>
          <li><a href="admin.html">Admin</a></li>
        </ul>
      </div>
      <div class="footer-section">
        <h4>Follow Us</h4>
        <div class="social-links">
          <a href="#">Facebook</a>
          <a href="#">Instagram</a>
          <a href="#">Twitter</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 MotoShowroom. All rights reserved.</p>
    </div>
  </footer>

  <script src="app.js"></script>
  <script src="products.js"></script>
</body>
</html>
